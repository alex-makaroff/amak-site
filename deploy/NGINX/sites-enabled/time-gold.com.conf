# sudo vim /etc/nginx/sites-enabled/time-gold.com.conf

upstream timegold {
    server 127.0.0.1:3003;
    keepalive 8;
}

# HTTPS server
server {
    server_name time-gold.com;
    access_log /opt/log/nginx/time-gold.com.log;

    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite hashed static assets — long cache
    location /assets/ {
        proxy_pass http://timegold;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API requests
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://timegold;
        proxy_redirect off;

        # Longer timeout for AI agent chat requests
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Everything else — SPA
    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://timegold;
        proxy_redirect off;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/time-gold.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/time-gold.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
#    ssl_protocols TLSv1.2 TLSv1.3;
}

# HTTP → HTTPS redirect
server {
    if ($host = time-gold.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 0.0.0.0:80;
    server_name time-gold.com;
    return 404; # managed by Certbot
}

# sudo systemctl restart nginx
